version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tx-m6-postgres
    environment:
      POSTGRES_USER: tx_m6_user
      POSTGRES_PASSWORD: tx_m6_password_change_me
      POSTGRES_DB: tx_m6
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tx-m6-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tx_m6_user -d tx_m6"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: tx-m6-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tx-m6-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tx-m6-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://tx_m6_user:tx_m6_password_change_me@postgres:5432/tx_m6
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      API_URL: ${API_URL:-http://localhost:5000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/.env:/app/.env
    networks:
      - tx-m6-network
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:5000}
    container_name: tx-m6-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:5000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/.env.local:/app/.env.local
    networks:
      - tx-m6-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  tx-m6-network:
    driver: bridge
